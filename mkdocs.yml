site_name: Newt
site_description: A lightweight Python toolkit for efficient feature analysis and statistical diagnostics in credit risk modeling
site_author: harrylyx
repo_url: https://github.com/harrylyx/newt
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - i18n:
      default_language: en
      languages:
        - locale: en
          name: English
          default: true
        - locale: zh
          name: 简体中文
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
  - autorefs

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - User Guide: user_guide.md
  - API Reference: api/reference.md
  - Benchmarks:
      - Performance vs Toad: benchmarks/metric_vs_toad.md
      - PSI Performance: benchmarks/psi_performance.md
      - ChiMerge Performance: benchmarks/chimerge_performance.md
